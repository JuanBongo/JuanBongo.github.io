<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALT+TAB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Titillium+Web:wght@300;400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#040814;
    --deep:#0a1730;
    --glass:rgba(120,190,255,0.09);
    --glass-edge:rgba(150,215,255,0.35);
    --glow:#8fe8ff;
    --glow-soft:rgba(143,232,255,0.55);
    --ink:#eaf6ff;
    --dim:#5f7f9c;
    --st-green:#6bffa8;
    --st-yellow:#ffe066;
    --st-red:#ff6b6b;
    --st-blue:#6bb8ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--void);overflow:hidden;font-family:'Inter',sans-serif;}

  .stage{
    position:relative;width:100%;height:100vh;perspective:1500px;
    background:
      radial-gradient(ellipse at 50% 15%, rgba(80,160,255,0.16), transparent 55%),
      linear-gradient(180deg, var(--void) 0%, var(--deep) 55%, #020509 100%);
  }

  .fog{
    position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(ellipse 60% 40% at 20% 70%, rgba(100,180,255,0.06), transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 60%, rgba(100,180,255,0.05), transparent 70%);
    animation:fogdrift 22s ease-in-out infinite alternate;
    filter:blur(6px);
  }
  @keyframes fogdrift{
    from{ transform:translateX(-2%) translateY(0); }
    to{ transform:translateX(2%) translateY(-1%); }
  }

  .particles{ position:absolute; inset:0; pointer-events:none; }
  .particle{
    position:absolute; border-radius:50%;
    background:rgba(170,225,255,0.5);
    box-shadow:0 0 6px 1px rgba(150,220,255,0.4);
    animation:rise linear infinite;
  }
  @keyframes rise{
    from{ transform:translateY(0); opacity:0; }
    10%{ opacity:0.6; }
    90%{ opacity:0.3; }
    to{ transform:translateY(-100vh); opacity:0; }
  }

  .waves{
    position:absolute; left:0; right:0; bottom:0; height:42%;
    overflow:hidden; pointer-events:none; opacity:0.55;
  }
  .wave{
    position:absolute; left:-25%; width:150%; height:220px;
    border-radius:48%;
    background:linear-gradient(180deg, rgba(90,175,255,0.10), transparent 75%);
    animation: wavemove ease-in-out infinite;
  }
  .w1{ bottom:-40px; animation-duration:16s; opacity:0.7; }
  .w2{ bottom:-70px; animation-duration:22s; animation-delay:-4s; opacity:0.5; }
  .w3{ bottom:-100px; animation-duration:28s; animation-delay:-10s; opacity:0.35; }
  @keyframes wavemove{
    0%{ transform:translateX(-3%) scaleY(1); }
    50%{ transform:translateX(3%) scaleY(1.08); }
    100%{ transform:translateX(-3%) scaleY(1); }
  }

  .clock{
    position:absolute; top:26px; left:32px; z-index:10;
    font-family:'Titillium Web',sans-serif; font-weight:300;
    font-size:13px; letter-spacing:0.12em; color:var(--dim);
  }

  .horizon-bg{
    position:absolute;left:0;right:0;top:64%;height:1px;
    background:linear-gradient(90deg,transparent,var(--glow),transparent);
    opacity:0.3; box-shadow:0 0 44px 4px var(--glow);
  }
  .floor{
    position:absolute;left:0;right:0;top:64%;bottom:0;
    background:linear-gradient(180deg, rgba(90,170,255,0.07), transparent 70%);
    transform:scaleY(-1);
    -webkit-mask-image:linear-gradient(180deg,black,transparent 78%);
            mask-image:linear-gradient(180deg,black,transparent 78%);
  }

  .cubefield{ position:absolute; inset:0; transform-style:preserve-3d; }
  .cube{
    position:absolute; width:var(--s); height:var(--s);
    transform-style:preserve-3d;
    animation:drift var(--dur) ease-in-out infinite, spin var(--spin) linear infinite;
    animation-delay:var(--delay);
    opacity:0.8;
  }
  .cube .face{
    position:absolute; width:100%; height:100%;
    background:var(--glass);
    border:1px solid var(--glass-edge);
    box-shadow:inset 0 0 22px rgba(150,220,255,0.14);
    backdrop-filter:blur(1px);
  }
  .cube .f1{transform:translateZ(calc(var(--s)/2));}
  .cube .f2{transform:rotateY(180deg) translateZ(calc(var(--s)/2));}
  .cube .f3{transform:rotateY(90deg) translateZ(calc(var(--s)/2));}
  .cube .f4{transform:rotateY(-90deg) translateZ(calc(var(--s)/2));}
  .cube .f5{transform:rotateX(90deg) translateZ(calc(var(--s)/2));}
  .cube .f6{transform:rotateX(-90deg) translateZ(calc(var(--s)/2));}
  @keyframes spin{ from{transform:rotateX(0) rotateY(0);} to{transform:rotateX(360deg) rotateY(360deg);} }
  @keyframes drift{ 0%,100%{margin-top:0px;} 50%{margin-top:-24px;} }

  .audio-toggle{
    position:absolute; top:26px; right:32px; z-index:10;
    display:flex; align-items:center; gap:8px;
    font-family:'Titillium Web',sans-serif; font-size:12px; letter-spacing:0.15em;
    color:var(--dim); text-transform:uppercase; cursor:pointer;
    user-select:none;
  }
  .audio-toggle:hover{ color:var(--ink); }
  .audio-dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--dim); transition:background .3s, box-shadow .3s;
  }
  .audio-toggle.on .audio-dot{
    background:var(--glow); box-shadow:0 0 8px 2px var(--glow-soft);
  }

  .menu-wrap{
    position:relative; z-index:5; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .brand{
    font-family:'Rajdhani',sans-serif; font-weight:700;
    font-size:44px; letter-spacing:0.12em; color:var(--ink);
    text-shadow:0 0 10px var(--glow-soft), 0 0 30px rgba(143,232,255,0.25);
  }

  .prompt{
    font-family:'Titillium Web',sans-serif; font-size:14px; letter-spacing:0.3em;
    color:var(--glow); text-transform:uppercase; margin-top:22px;
    cursor:pointer; background:none; border:none;
    transition:opacity .5s ease, transform .5s ease;
  }
  .prompt:hover{ text-shadow:0 0 12px var(--glow), 0 0 26px var(--glow-soft); }
  .prompt::after{ content:'_'; margin-left:2px; animation:blink 1.1s step-end infinite; }
  @keyframes blink{ 50%{ opacity:0; } }
  .prompt.hidden{ opacity:0; transform:scale(0.9); pointer-events:none; position:absolute; }

  /* the sliding divider line */
  .divider{
    width:0px; height:1px; margin:22px 0;
    background:linear-gradient(90deg,transparent,var(--glow),transparent);
    box-shadow:0 0 14px 1px var(--glow);
    opacity:0;
    transform:translateY(18px);
    transition:opacity .5s ease .1s, transform .5s ease .1s, width .6s ease .1s;
  }
  .divider.show{ width:260px; opacity:1; transform:translateY(0); }

  .post-start{
    opacity:0; max-height:0; overflow:hidden;
    display:flex; flex-direction:column; align-items:center;
    transition:opacity .5s ease;
  }
  .post-start.show{ opacity:1; max-height:800px; overflow:visible; }

  nav.menu{
    display:flex; flex-direction:row; align-items:flex-end; gap:50px;
    opacity:1; transform:scale(1);
    transition:opacity .3s ease, transform .3s ease;
  }
  nav.menu.hide{ opacity:0; transform:scale(0.96); pointer-events:none; }

  .item{
    display:flex; flex-direction:column; align-items:center; gap:12px;
    cursor:pointer; width:64px;
  }
  .icon{
    width:38px; height:38px; opacity:0.5; transform:scale(0.82);
    transition:opacity .35s ease, transform .35s ease;
  }
  .icon svg{
    width:100%; height:100%; fill:none; stroke:var(--dim);
    stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round;
    transition:stroke .35s ease, filter .35s ease;
  }
  .item:hover .icon, .item.active .icon{ opacity:1; transform:scale(1.05); }
  .item.active .icon{ transform:scale(1.18); }
  .item:hover .icon svg, .item.active .icon svg{
    stroke:var(--glow);
    filter:drop-shadow(0 0 6px var(--glow-soft));
  }

  .label{
    font-family:'Titillium Web',sans-serif; font-weight:400; font-size:12px;
    letter-spacing:0.1em; text-transform:uppercase; text-align:center;
    color:var(--dim); opacity:0; transform:translateY(-4px);
    transition:opacity .3s ease, transform .3s ease, color .3s ease;
    white-space:nowrap;
  }
  .item:hover .label, .item.active .label{
    opacity:1; transform:translateY(0); color:var(--glow);
    text-shadow:0 0 10px var(--glow-soft);
  }

  /* dynamic content area — swaps between panel / cast list / profile */
  .content-stack{
    position:relative; margin-top:34px; width:min(720px,90vw); min-height:60px;
    opacity:0; transform:scale(0.96);
    transition:opacity .3s ease, transform .3s ease;
    display:none;
  }
  .content-stack.show{ opacity:1; transform:scale(1); }
  #dynamicContent{
    opacity:1; transform:translateX(0);
    transition:opacity .32s ease, transform .32s ease;
  }
  #dynamicContent.leaving{ opacity:0; transform:translateX(-36px); }
  #dynamicContent.entering{ opacity:0; transform:translateX(36px); transition:none; }

  .panel{
    background:var(--glass); border:1px solid var(--glass-edge);
    box-shadow:0 0 44px rgba(120,200,255,0.08), inset 0 0 30px rgba(150,220,255,0.06);
    backdrop-filter:blur(6px);
    padding:26px 30px; color:var(--ink); font-size:15px; line-height:1.6;
  }
  .panel h2{
    font-family:'Titillium Web',sans-serif; font-size:14px; letter-spacing:0.22em;
    color:var(--glow); text-transform:uppercase; margin-bottom:10px;
  }

  /* cast list */
  .cast-list{ display:flex; flex-direction:column; align-items:center; gap:4px; }
  .cast-row{
    width:100%; max-width:360px; position:relative;
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:'Titillium Web',sans-serif; font-size:18px; letter-spacing:0.05em;
    color:var(--dim); text-transform:uppercase;
    padding:9px 18px; cursor:pointer; border-radius:2px;
    transition:color .3s ease, transform .3s ease, background .3s ease;
  }
  .cast-row::after{
    content:'›'; position:absolute; left:0px; top:50%;
    transform:translateY(-50%) translateX(-8px);
    color:var(--glow); font-size:16px; opacity:0;
    transition:opacity .25s ease, transform .25s ease;
  }
  .cast-row:hover::after{ opacity:1; transform:translateY(-50%) translateX(0); }
  .cast-row:hover{ color:var(--ink); transform:translateX(4px); background:rgba(143,232,255,0.06); }
  .cast-row .role{ font-size:13px; color:var(--glow); letter-spacing:0.12em; opacity:0.85; }
  .back-link{
    font-family:'Titillium Web',sans-serif; font-size:12px; letter-spacing:0.2em;
    color:var(--dim); text-transform:uppercase; cursor:pointer;
    margin-bottom:14px; display:inline-block;
    transition:color .3s ease;
  }
  .back-link:hover{ color:var(--glow); }

  /* profile card */
  .profile{
    background:var(--glass); border:1px solid var(--glass-edge);
    box-shadow:0 0 44px rgba(120,200,255,0.08), inset 0 0 30px rgba(150,220,255,0.06);
    backdrop-filter:blur(6px);
    padding:26px 30px;
    display:flex; gap:22px; align-items:flex-start;
  }
  .p-photo{
    flex:none; width:88px; height:88px; border-radius:4px;
    background:radial-gradient(ellipse at 30% 25%, rgba(143,232,255,0.28), rgba(120,190,255,0.08));
    border:1px solid var(--glass-edge);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    font-family:'Titillium Web',sans-serif; font-size:32px; font-weight:700;
    color:var(--glow); text-shadow:0 0 14px var(--glow-soft);
  }
  .p-photo-img{ width:100%; height:100%; object-fit:cover; display:block; }
  .p-info{ color:var(--ink); }
  .p-name{
    font-family:'Rajdhani',sans-serif; font-size:24px; font-weight:700;
    letter-spacing:0.05em; text-shadow:0 0 10px var(--glow-soft);
  }
  .p-role{
    font-family:'Titillium Web',sans-serif; font-size:13px; letter-spacing:0.18em;
    color:var(--glow); text-transform:uppercase; margin-top:4px;
  }
  .p-meta{ font-size:14px; color:var(--ink); margin-top:14px; line-height:1.6; }
  .p-meta b{ color:var(--glow); font-weight:600; }
  .p-fun{ font-size:14px; color:var(--dim); margin-top:8px; line-height:1.6; }

  /* ---------- pie chart ---------- */
  .pie-panel{ max-width:640px; }
  .pie-body{
    display:flex; align-items:center; justify-content:center;
  }
  .pie-svg{ width:100%; height:auto; max-width:560px; }
  .pie-svg text{ font-family:'Titillium Web',sans-serif; }
  .pie-svg .pie-label{ font-size:15px; letter-spacing:0.06em; fill:var(--ink); }
  .pie-svg .pie-pct{ font-size:13px; fill:var(--dim); }
  .pie-note{
    margin-top:14px; font-size:12px; color:var(--dim); text-align:center;
    letter-spacing:0.04em;
  }

  /* ---------- video list ---------- */
  .video-panel{
    max-width:700px;
    max-height:56vh;
    overflow-y:auto;
    padding-right:10px;
    scrollbar-width:thin;
    scrollbar-color:var(--glass-edge) transparent;
  }
  .video-panel::-webkit-scrollbar{ width:6px; }
  .video-panel::-webkit-scrollbar-track{ background:transparent; }
  .video-panel::-webkit-scrollbar-thumb{ background:var(--glass-edge); border-radius:3px; }
  .video-panel::-webkit-scrollbar-thumb:hover{ background:var(--glow); }

  .cat-list.video-list-scroll{
    overflow-y:auto;
    scrollbar-width:thin;
    scrollbar-color:var(--glass-edge) transparent;
  }
  .archive-cat.open .cat-list.video-list-scroll{ max-height:260px; }
  .video-list-scroll::-webkit-scrollbar{ width:5px; }
  .video-list-scroll::-webkit-scrollbar-track{ background:transparent; }
  .video-list-scroll::-webkit-scrollbar-thumb{ background:var(--glass-edge); border-radius:3px; }

  .video-row{
    padding:9px 16px 9px 14px; margin:0 10px 6px;
    border-left:3px solid var(--glass-edge);
    background:rgba(255,255,255,0.02);
    font-family:'Titillium Web',sans-serif; font-size:13.5px;
    letter-spacing:0.02em; line-height:1.4;
  }
  .video-row:last-child{ margin-bottom:12px; }
  .video-row a{
    color:var(--ink); text-decoration:none;
    transition:color .25s ease, text-shadow .25s ease;
  }
  .video-row a:hover{
    color:var(--glow); text-shadow:0 0 8px var(--glow-soft);
    text-decoration:underline;
  }
  .archive-panel{
    max-width:620px;
    max-height:52vh;
    overflow-y:auto;
    padding-right:10px;
    scrollbar-width:thin;
    scrollbar-color:var(--glass-edge) transparent;
  }
  .archive-panel::-webkit-scrollbar{ width:6px; }
  .archive-panel::-webkit-scrollbar-track{ background:transparent; }
  .archive-panel::-webkit-scrollbar-thumb{ background:var(--glass-edge); border-radius:3px; }
  .archive-panel::-webkit-scrollbar-thumb:hover{ background:var(--glow); }
  .archive-key{
    display:flex; flex-wrap:wrap; gap:14px 22px; margin-bottom:20px;
    padding-bottom:16px; border-bottom:1px solid var(--glass-edge);
  }
  .key-row{
    display:flex; align-items:center; gap:8px;
    font-family:'Titillium Web',sans-serif; font-size:12px;
    letter-spacing:0.08em; text-transform:uppercase; color:var(--dim);
  }
  .key-dot{
    width:9px; height:9px; border-radius:50%; flex:none;
    box-shadow:0 0 6px 1px currentColor;
  }

  .archive-cats{ display:flex; flex-direction:column; gap:8px; }
  .archive-cat{
    border:1px solid var(--glass-edge); border-radius:3px;
    background:rgba(120,190,255,0.04);
    overflow:hidden;
  }
  .cat-header{
    display:flex; align-items:center; gap:10px;
    padding:12px 16px; cursor:pointer; user-select:none;
  }
  .cat-arrow{
    color:var(--glow); font-size:16px; line-height:1;
    transition:transform .3s ease;
    display:inline-block;
  }
  .archive-cat.open .cat-arrow{ transform:rotate(90deg); }
  .cat-title{
    font-family:'Titillium Web',sans-serif; font-weight:600; font-size:14px;
    letter-spacing:0.14em; text-transform:uppercase; color:var(--ink); flex:1;
  }
  .cat-count{
    font-family:'Titillium Web',sans-serif; font-size:11px; color:var(--dim);
    letter-spacing:0.08em;
  }
  .cat-list{
    max-height:0; overflow:hidden;
    transition:max-height .35s ease;
  }
  .archive-cat.open .cat-list{ max-height:900px; }
  .game-row{
    display:flex; align-items:baseline; gap:10px;
    padding:8px 16px 8px 14px; margin:0 10px 6px;
    border-left:3px solid; background:rgba(255,255,255,0.02);
    font-family:'Titillium Web',sans-serif; font-size:13.5px;
    letter-spacing:0.02em; color:var(--ink);
  }
  .game-row:last-child{ margin-bottom:12px; }
  .game-note{
    font-size:11.5px; color:var(--dim); font-style:italic;
  }
  .game-status{
    margin-left:auto; font-size:10.5px; letter-spacing:0.12em;
    text-transform:uppercase; white-space:nowrap;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="cubefield" id="cubefield"></div>
  <div class="fog"></div>
  <div class="particles" id="particles"></div>
  <div class="horizon-bg"></div>
  <div class="floor"></div>
  <div class="waves">
    <div class="wave w1"></div>
    <div class="wave w2"></div>
    <div class="wave w3"></div>
  </div>

  <div class="clock" id="clock"></div>

  <audio id="bgAudio" src="audio/ambient.mp3" loop preload="none"></audio>
  <audio id="clickSound" src="audio/click.mp3" preload="auto"></audio>
  <audio id="exitSound" src="audio/exit.mp3" preload="auto"></audio>

  <div class="audio-toggle" id="audioToggle">
    <span class="audio-dot"></span><span id="audioLabel">Sound Off</span>
  </div>

  <div class="menu-wrap">
    <div class="brand">ALT+TAB</div>
    <div class="prompt" id="startPrompt">&gt; start</div>

    <div class="post-start" id="postStart">
      <div class="divider" id="divider"></div>

      <nav class="menu" id="menu">
        <div class="item" data-panel="cast">
          <div class="icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>
          </div>
          <div class="label">Cast</div>
        </div>
        <div class="item" data-panel="archive">
          <div class="icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="9" width="18" height="8" rx="4"/><circle cx="8" cy="13" r="1"/><circle cx="16" cy="13" r="1"/></svg>
          </div>
          <div class="label">Game Archive</div>
        </div>
        <div class="item" data-panel="pie">
          <div class="icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v9h9"/></svg>
          </div>
          <div class="label">Pie Chart</div>
        </div>
        <div class="item" data-panel="videos">
          <div class="icon">
            <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="3"/><rect x="4" y="10.5" width="16" height="3"/><rect x="4" y="16" width="10" height="3"/></svg>
          </div>
          <div class="label">Video List</div>
        </div>
        <div class="item" data-panel="contact">
          <div class="icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="1"/><path d="M3 7l9 6 9-6"/></svg>
          </div>
          <div class="label">Contact</div>
        </div>
      </nav>

      <div class="content-stack" id="contentStack">
        <div id="dynamicContent"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ---------- click / exit sounds ----------
  const clickSoundEl = document.getElementById('clickSound');
  const exitSoundEl = document.getElementById('exitSound');
  function playSound(el){
    const node = el.cloneNode(true);
    node.volume = 0.5;
    node.play().catch(()=>{ /* file missing or blocked until first interaction */ });
  }
  document.addEventListener('click', function(e){
    if(e.target.closest('.back-link')){
      playSound(exitSoundEl);
    } else if(e.target.closest('.item, .cast-row, .prompt, .audio-toggle')){
      playSound(clickSoundEl);
    }
  });

  // ---------- clock ----------
  function updateClock(){
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes().toString().padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h === 0) h = 12;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const day = days[now.getDay()];
    document.getElementById('clock').textContent = `${day}  ${h}:${m} ${ampm}`;
  }
  updateClock();
  setInterval(updateClock, 1000 * 15);

  // ---------- cube field ----------
  const field = document.getElementById('cubefield');
  for(let i=0;i<14;i++){
    const cube = document.createElement('div');
    cube.className = 'cube';
    const size = 18 + Math.random()*46;
    cube.style.setProperty('--s', size+'px');
    cube.style.setProperty('--dur', (5+Math.random()*6)+'s');
    cube.style.setProperty('--spin', (16+Math.random()*22)+'s');
    cube.style.setProperty('--delay', -(Math.random()*10)+'s');
    cube.style.left = (Math.random()*100)+'%';
    cube.style.top = (Math.random()*55)+'%';

  function renderPieChart(){
    const counts = { played:0, playing:0, backlog:0, next:0 };
    gameArchive.forEach(cat => cat.games.forEach(g => counts[g.status]++));
    const total = Object.values(counts).reduce((a,b)=>a+b, 0);
    const order = ['played','playing','backlog','next'];

    const cx = 260, cy = 250, r = 165, labelR = r + 55;
    let angle = -90;
    let svgBits = '';

    order.forEach(key=>{
      const count = counts[key];
      if(count === 0) return;
      const sweep = (count/total) * 360;
      const startA = angle;
      const endA = angle + sweep;
      const midA = (startA + endA) / 2;
      angle = endA;

      const toRad = a => a * Math.PI/180;
      const pt = (a, radius) => [ cx + radius*Math.cos(toRad(a)), cy + radius*Math.sin(toRad(a)) ];

      const [x0,y0] = pt(startA, r);
      const [x1,y1] = pt(endA, r);
      const largeArc = sweep > 180 ? 1 : 0;
      const path = `M ${cx},${cy} L ${x0.toFixed(2)},${y0.toFixed(2)} A ${r},${r} 0 ${largeArc} 1 ${x1.toFixed(2)},${y1.toFixed(2)} Z`;

      const [dotX,dotY] = pt(midA, r);
      const [labelX,labelY] = pt(midA, labelR);
      const onRight = Math.cos(toRad(midA)) >= 0;
      const anchor = onRight ? 'start' : 'end';
      const textX = labelX + (onRight ? 10 : -10);
      const pct = ((count/total)*100).toFixed(1);
      const color = STATUS[key].color;

      svgBits += `
        <path d="${path}" style="fill:${color};fill-opacity:0.82;stroke:var(--void);stroke-width:2"/>
        <line x1="${dotX.toFixed(2)}" y1="${dotY.toFixed(2)}" x2="${labelX.toFixed(2)}" y2="${labelY.toFixed(2)}" style="stroke:${color};stroke-width:1;opacity:0.6"/>
        <circle cx="${dotX.toFixed(2)}" cy="${dotY.toFixed(2)}" r="3" style="fill:${color}"/>
        <text x="${textX.toFixed(2)}" y="${(labelY-4).toFixed(2)}" text-anchor="${anchor}" class="pie-label">${STATUS[key].label}</text>
        <text x="${textX.toFixed(2)}" y="${(labelY+14).toFixed(2)}" text-anchor="${anchor}" class="pie-pct">${count} games · ${pct}%</text>
      `;
    });

    return `<div class="back-link" id="backToMenu">&lt; Menu</div><div class="panel pie-panel">
      <h2>Completion Chart</h2>
      <div class="pie-body">
        <svg class="pie-svg" viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg">${svgBits}</svg>
      </div>
      <div class="pie-note">${total} games tracked across the archive.</div>
    </div>`;
  }

  // ---------- ambient audio ----------
  const bgAudio = document.getElementById('bgAudio');
  bgAudio.volume = 0;
  let on = false;
  let fadeTimer = null;

  function fadeTo(target, duration){
    clearInterval(fadeTimer);
    const steps = 24;
    const stepTime = duration / steps;
    const start = bgAudio.volume;
    const delta = (target - start) / steps;
    let count = 0;
    fadeTimer = setInterval(()=>{
      count++;
      bgAudio.volume = Math.min(1, Math.max(0, start + delta * count));
      if(count >= steps) clearInterval(fadeTimer);
    }, stepTime);
  }

  const toggle = document.getElementById('audioToggle');
  const label = document.getElementById('audioLabel');
  toggle.addEventListener('click', async ()=>{
    on = !on;
    if(on){
      try{
        await bgAudio.play();
        fadeTo(0.5, 800);
      }catch(err){
        console.warn('Audio failed to play — check that audio/ambient.mp3 exists.', err);
      }
    } else {
      fadeTo(0, 800);
      setTimeout(()=>{ if(!on) bgAudio.pause(); }, 850);
    }
    toggle.classList.toggle('on', on);
    label.textContent = on ? 'Sound On' : 'Sound Off';
  });
